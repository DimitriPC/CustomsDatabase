<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #161a23;
            --surface2: #1e2330;
            --border: #2a3045;
            --accent: #e8ff47;
            --accent2: #ff4f6d;
            --text: #eef0f7;
            --muted: #6b7394;
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 20px 80px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

            header h1 {
                font-family: 'Bebas Neue', sans-serif;
                font-size: clamp(3rem, 8vw, 6rem);
                letter-spacing: 0.06em;
                line-height: 1;
                background: linear-gradient(135deg, var(--accent) 0%, #7fffb0 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            header p {
                color: var(--muted);
                font-size: 0.95rem;
                margin-top: 8px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
            }

        .grid {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── Card base ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 28px 24px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
        }

            .card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: var(--accent);
                border-radius: var(--radius) var(--radius) 0 0;
            }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:nth-child(1) {
            animation-delay: 0.05s;
        }

        .card:nth-child(2) {
            animation-delay: 0.12s;
        }

        .card:nth-child(3) {
            animation-delay: 0.19s;
        }

        .card:nth-child(4) {
            animation-delay: 0.26s;
        }

        .card:nth-child(5) {
            animation-delay: 0.33s;
        }

        .card:nth-child(6) {
            animation-delay: 0.40s;
        }

        .card:nth-child(7) {
            animation-delay: 0.47s;
        }

        .card:nth-child(8) {
            animation-delay: 0.54s;
        }

        .card-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.35rem;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .card-label .icon {
                width: 30px;
                height: 30px;
                background: rgba(232,255,71,0.1);
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1rem;
            }

        /* ── Photo card ── */
        .photo-drop {
            border: 2px dashed var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            color: var(--muted);
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

            .photo-drop:hover {
                border-color: var(--accent);
                background: rgba(232,255,71,0.04);
            }

            .photo-drop input[type="file"] {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%;
            }

            .photo-drop svg {
                opacity: 0.4;
            }

        #photoPreview {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 10px;
            display: none;
            margin-top: 14px;
        }

        #photoName {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 8px;
            display: none;
        }

        /* ── Shared input styles ── */
        input[type="time"],
        input[type="number"],
        input[type="text"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            padding: 14px 18px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,255,71,0.12);
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(0.6);
            cursor: pointer;
        }

        /* ── Score card ── */
        .score-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .team-name {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
        }

        .score-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 0.05em;
            text-align: center;
            padding: 10px 8px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

            .score-input:focus {
                border-color: var(--accent2);
                box-shadow: 0 0 0 3px rgba(255,79,109,0.15);
            }

        .vs {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: var(--muted);
            letter-spacing: 0.08em;
        }

        /* ── Map card ── */
        .map-search {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

            .map-search input {
                flex: 1;
            }

            .map-search button {
                background: var(--accent);
                color: #0d0f14;
                border: none;
                border-radius: 10px;
                font-family: 'DM Sans', sans-serif;
                font-weight: 600;
                font-size: 0.9rem;
                padding: 0 20px;
                cursor: pointer;
                transition: opacity 0.2s;
                white-space: nowrap;
            }

                .map-search button:hover {
                    opacity: 0.85;
                }

        .map-frame-wrap {
            border-radius: 12px;
            overflow: hidden;
            height: 220px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.85rem;
            text-align: center;
            flex-direction: column;
            gap: 8px;
        }

            .map-frame-wrap iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: none;
            }

        .map-placeholder svg {
            opacity: 0.3;
        }

        /* ── First to number ── */
        .firstto-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

            .firstto-row input[type="number"] {
                max-width: 160px;
                font-size: 1.4rem;
                text-align: center;
                font-family: 'Bebas Neue', sans-serif;
                letter-spacing: 0.05em;
            }

        .firstto-label {
            font-size: 0.9rem;
            color: var(--muted);
        }

        /* ── Toggle group ── */
        .toggle-group {
            display: flex;
            gap: 12px;
        }

        .toggle-btn {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 14px;
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.04em;
        }

            .toggle-btn:hover {
                border-color: var(--accent);
                color: var(--text);
            }

            .toggle-btn.active {
                background: var(--accent);
                border-color: var(--accent);
                color: #0d0f14;
                font-weight: 700;
            }

        /* ── Submit ── */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 760px;
            margin: 28px auto 0;
            background: var(--accent);
            color: #0d0f14;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.12em;
            border: none;
            border-radius: var(--radius);
            padding: 18px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

            .submit-btn:hover {
                opacity: 0.9;
                transform: translateY(-1px);
            }

            .submit-btn:active {
                transform: translateY(0);
            }

        select.score-input {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .toggle-group input[type="radio"] {
            display: none;
        }

            .toggle-group input[type="radio"]:checked + label {
                background: var(--accent);
                border-color: var(--accent);
                color: #0d0f14;
                font-weight: 700;
            }

        .toggle-group label {
            flex: 1;
            text-align: center;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 14px;
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.04em;
        }

            .toggle-group label:hover {
                border-color: var(--accent);
                color: var(--text);
            }

        :root {
            /* existing vars... */
            --accent3: #47c2ff;
            --surface3: #252b3b;
        }
    </style>
</head>
<body>
    <form method="POST" enctype="multipart/form-data">
        <header>
            <h1>Match Entry</h1>
            <p>Fill in the details below</p>
        </header>

        <div class="grid">

            <!-- 1. Photo -->
            <div class="card">
                <div class="card-label">
                    Photo
                </div>
                <div class="photo-drop" id="photoDrop">
                    <input type="file" name="photo" accept="image/*" id="photoInput">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></svg>
                    <span>Click or drag to upload a photo</span>
                </div>
                <img id="photoPreview" alt="Preview">
                <p id="photoName"></p>
            </div>

            <!-- Team side assignement -->>
            <div class="card">
                <div class="card-label">Team Sides</div>
                <div class="score-row">
                    <div class="team-block">
                        <span class="team-name">Home</span>
                        <select name="home_team_id" class="score-input">
                            {% for team in match.match_teams %}
                            <option value="{{ team.match_team_id }}">Team {{ team.participants[0].user.username if team.participants else 'No players' }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <span class="vs">VS</span>
                    <div class="team-block">
                        <span class="team-name">Away</span>
                        <select name="away_team_id" class="score-input">
                            {% for team in match.match_teams %}
                            <option value="{{ team.match_team_id }}">Team {{ team.participants[0].user.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <!-- 2. Time -->
            <div class="card">
                <div class="card-label">
                    Match Time
                </div>
                <input type="time" id="matchTime">
            </div>



            <!-- 4. First to number -->
            <div class="card">
                <div class="card-label">
                    First To
                </div>
                <div class="firstto-row">
                    <input type="number" name="first_to" id="firstTo" min="1" max="999" placeholder="4">
                    <span class="firstto-label">rounds</span>
                </div>
            </div>

            <!-- 5. Score -->
            <div class="card">
                <div class="card-label">
                    <span class="icon">⚽</span> Score
                </div>
                <div class="score-row">
                    <div class="team-block">
                        <span class="team-name">Team 1</span>
                        <input type="number" name="score1" class="score-input" id="score1" min="0" placeholder="0">
                    </div>
                    <span class="vs">VS</span>
                    <div class="team-block">
                        <span class="team-name">Team 2</span>
                        <input type="number" name="score2" class="score-input" id="score2" min="0" placeholder="0">
                    </div>
                </div>
            </div>

            <!-- 6. Winner -->
            <div class="card">
                <div class="card-label">Winner</div>
                <div class="toggle-group">
                    <input type="radio" name="winner" id="winner_home" value="home" checked>
                    <label for="winner_home">🏠 Home</label>

                    <input type="radio" name="winner" id="winner_away" value="away">
                    <label for="winner_away">✈️ Away</label>
                </div>
            </div>

            <!-- 7. Win Type -->
            <div class="card">
                <div class="card-label">Win Type</div>
                <div class="toggle-group">
                    <input type="radio" name="win_type" id="regular" value="regular" checked>
                    <label for="regular">Regular</label>

                    <input type="radio" name="win_type" id="overtime" value="overtime">
                    <label for="overtime">Overtime</label>
                </div>
            </div>

            <!-- 8. Rainbow Six Map -->
            <div class="card">
                <div class="card-label">
                    R6 Map
                </div>
                <input type="text" name="r6map" id="r6map" placeholder="e.g. Bank, Clubhouse, Oregon…">
            </div>

        </div>

        <button class="submit-btn">Save Game</button>
    </form>
        

    <script>
        // Photo preview
        document.getElementById('photoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
        const img = document.getElementById('photoPreview');
        const name = document.getElementById('photoName');
        const drop = document.getElementById('photoDrop');
        img.src = ev.target.result;
        img.style.display = 'block';
        name.textContent = file.name;
        name.style.display = 'block';
        drop.style.minHeight = '0';
        drop.querySelector('svg').style.display = 'none';
        drop.querySelector('span').style.display = 'none';
        };
        reader.readAsDataURL(file);
        });


    </script>
</body>
</html>
