<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #161a23;
            --surface2: #1e2330;
            --surface3: #252b3b;
            --border: #2a3045;
            --accent: #e8ff47;
            --accent2: #ff4f6d;
            --accent3: #47c2ff;
            --text: #eef0f7;
            --muted: #6b7394;
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 20px 80px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

            header h1 {
                font-family: 'Bebas Neue', sans-serif;
                font-size: clamp(3rem, 8vw, 6rem);
                letter-spacing: 0.06em;
                line-height: 1;
                background: linear-gradient(135deg, var(--accent3) 0%, var(--accent) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            header p {
                color: var(--muted);
                font-size: 0.95rem;
                margin-top: 8px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
            }

        .grid {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 28px 24px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
        }

            .card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: var(--accent3);
                border-radius: var(--radius) var(--radius) 0 0;
            }

            .card:nth-child(1) {
                animation-delay: 0.05s;
            }

            .card:nth-child(2) {
                animation-delay: 0.12s;
            }

            .card:nth-child(3) {
                animation-delay: 0.19s;
            }

            .card:nth-child(4) {
                animation-delay: 0.26s;
            }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.35rem;
            letter-spacing: 0.1em;
            color: var(--accent3);
            margin-bottom: 18px;
        }

        input[type="date"],
        input[type="number"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            padding: 14px 18px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            color-scheme: dark;
        }

        input:focus {
            border-color: var(--accent3);
            box-shadow: 0 0 0 3px rgba(71,194,255,0.12);
        }

        /* ── Toggle — CSS radio trick, zero JS ── */
        .toggle-group {
            display: flex;
            gap: 12px;
        }

            .toggle-group input[type="radio"] {
                display: none;
            }

            .toggle-group label {
                flex: 1;
                text-align: center;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--muted);
                font-family: 'DM Sans', sans-serif;
                font-size: 1rem;
                font-weight: 500;
                padding: 14px;
                cursor: pointer;
                transition: all 0.18s;
                letter-spacing: 0.04em;
            }

                .toggle-group label:hover {
                    border-color: var(--accent3);
                    color: var(--text);
                }

            .toggle-group input[type="radio"]:checked + label {
                background: var(--accent3);
                border-color: var(--accent3);
                color: #0d0f14;
                font-weight: 700;
            }

        /* ── First to ── */
        .firstto-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

            .firstto-row input[type="number"] {
                max-width: 160px;
                font-size: 1.4rem;
                text-align: center;
                font-family: 'Bebas Neue', sans-serif;
                letter-spacing: 0.05em;
            }

        .firstto-label {
            font-size: 0.9rem;
            color: var(--muted);
        }

        /* ── Teams ── */
        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 560px) {
            .teams-grid {
                grid-template-columns: 1fr;
            }
        }

        .team-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

            .team-title .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }

        .team1 .dot {
            background: var(--accent);
        }

        .team2 .dot {
            background: var(--accent2);
        }

        .slot-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slot-label {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .player-select {
            width: 100%;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            padding: 10px 12px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

            .player-select:focus {
                border-color: var(--accent3);
            }

        /* ── Submit ── */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 760px;
            margin: 28px auto 0;
            background: var(--accent3);
            color: #0d0f14;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.12em;
            border: none;
            border-radius: var(--radius);
            padding: 18px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

            .submit-btn:hover {
                opacity: 0.9;
                transform: translateY(-1px);
            }

            .submit-btn:active {
                transform: translateY(0);
            }
    </style>
</head>
<body>

    <header>
        <h1>Add Match</h1>
        <p>Set up a new match</p>
    </header>

    <form method="POST" action="{{ url_for('add_match') }}">

        <div class="grid">

            {# 1. Date #}
            <div class="card">
                <div class="card-label">Date</div>
                <input type="date" name="date_match" value="{{ today }}" required>
            </div>

            {# 2. Status #}
            <div class="card">
                <div class="card-label">Status</div>
                <div class="toggle-group">
                    <input type="radio" name="status" id="ongoing" value="ongoing" checked>
                    <label for="ongoing">🟢 &nbsp;Ongoing</label>

                    <input type="radio" name="status" id="completed" value="completed">
                    <label for="completed">✅ &nbsp;Completed</label>
                </div>
            </div>

            {# 3. First To #}
            <div class="card">
                <div class="card-label">First To</div>
                <div class="firstto-row">
                    <input type="number" name="first_to" min="1" max="999" placeholder="7">
                    <span class="firstto-label">points / goals / sets</span>
                </div>
            </div>

            {# 4. Teams & Players #}
            <div class="card">
                <div class="card-label">Teams & Players</div>
                <div class="teams-grid">

                    {% for team_num in [1, 2] %}
                    <div class="team-card team{{ team_num }}">
                        <div class="team-title">
                            <span class="dot"></span> Team {{ team_num }}
                        </div>

                        {% for slot in range(1, 6) %}
                        <div class="slot-wrap">
                            <span class="slot-label">Player {{ slot }}</span>
                            <select name="team{{ team_num }}_player_{{ slot }}" class="player-select">
                                <option value="">— Select —</option>
                                {% for player in players %}
                                <option value="{{ player.user_id }}">{{ player.username }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endfor %}

                    </div>
                    {% endfor %}

                </div>
            </div>

        </div>

        <button type="submit" class="submit-btn">Create Match</button>
    </form>

</body>
</html>
