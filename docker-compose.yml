services:
  web:
    build: .
    container_name: customsApp
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FLASK_APP: runserver.py
      FLASK_ENV: development
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped
    volumes:
      - .:/app

  frontend:
    image: node:lts
    container_name: customsFrontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - web

  db:
    image: postgres:16
    container_name: customsdb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dimitri -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  frontend_node_modules: